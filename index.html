<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap The Cake 🎂</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at center,#2b1055,#000000);
  overflow:hidden;
  font-family:sans-serif;
}

/* Aura Glow */
.aura{
  position:absolute;
  width:350px;
  height:350px;
  background: radial-gradient(circle,
    rgba(255,215,0,0.8) 0%,
    rgba(255,0,255,0.5) 40%,
    transparent 70%);
  border-radius:50%;
  filter:blur(60px);
  animation:pulse 3s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.3)}
  100%{transform:scale(1)}
}

/* Cake */
.cake{
  font-size:120px;
  cursor:pointer;
  z-index:2;
  transition:0.4s;
}

.cake:hover{
  transform:scale(1.1);
}

/* Flash Effect */
.flash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  top:0;
  left:0;
  opacity:0;
  pointer-events:none;
}

.flash.active{
  animation:flashAnim 0.6s forwards;
}

@keyframes flashAnim{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0;}
}

</style>
</head>

<body>

<div class="aura"></div>

<div class="cake" onclick="openSite()">🎂</div>

<div class="flash" id="flash"></div>

<script>

function openSite(){

  // cake grow effect
  document.querySelector(".cake").style.transform = "scale(1.5)";

  // flash effect
  document.getElementById("flash").classList.add("active");

  // redirect after delay
  setTimeout(function(){
    window.location.href = "https://faizan-oss-code.github.io/birthday.html";
  },800);
}

</script>

</body>
</html>
